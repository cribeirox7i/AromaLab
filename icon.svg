<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1410"/>
      <stop offset="1" stop-color="#0b0806"/>
    </linearGradient>
    <linearGradient id="corpo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf6fb"/>
      <stop offset="0.55" stop-color="#a9d6e8"/>
      <stop offset="1" stop-color="#6fb3cf"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- tripé -->
  <line x1="256" y1="392" x2="130" y2="470" stroke="#8a95a0" stroke-width="13" stroke-linecap="round"/>
  <line x1="256" y1="392" x2="382" y2="470" stroke="#8a95a0" stroke-width="13" stroke-linecap="round"/>
  <!-- anel de suporte -->
  <ellipse cx="256" cy="332" rx="100" ry="10" fill="none" stroke="#8a95a0" stroke-width="9"/>
  <!-- corpo do alambique -->
  <circle cx="256" cy="272" r="94" fill="url(#corpo)" stroke="#4d8ba8" stroke-width="7"/>
  <!-- gargalo -->
  <rect x="230" y="152" width="52" height="72" rx="10" fill="url(#corpo)" stroke="#4d8ba8" stroke-width="7"/>
  <!-- faixa verde -->
  <rect x="220" y="208" width="72" height="18" rx="4" fill="#7fae5a"/>
  <!-- rolha -->
  <rect x="220" y="128" width="72" height="26" rx="6" fill="#5a4a3a"/>
</svg>
